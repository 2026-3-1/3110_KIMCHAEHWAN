services:
  backend:
    build: ./backend
    container_name: devclass-backend
    ports:
      - "8081:8081"
    environment:
      MAIL_USERNAME: ${MAIL_USERNAME:-gumrak54@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-rgwq gxwi xght btnl}
      JWT_SECRET: ${JWT_SECRET:-devclass-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-ok}
      DISCORD_ADMIN_WEBHOOK_URL: ${DISCORD_ADMIN_WEBHOOK_URL:-}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-test_sk_ORzdMaqN3wy4ojNgkalBr5AkYXQG}
      TOSS_CLIENT_KEY: ${TOSS_CLIENT_KEY:-test_ck_24xLea5zVAEgjvopZ1B6VQAMYNwW}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-0c1301cece59b4652edb086131ba8d1bed319f}
      ADMIN_CODE: ${ADMIN_CODE:-devclass-admin-2025}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: devclass-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
